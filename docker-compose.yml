services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: volcan_user
      POSTGRES_PASSWORD: volcan_password
      POSTGRES_DB: volcan_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://volcan_user:volcan_password@db:5432/volcan_db
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
